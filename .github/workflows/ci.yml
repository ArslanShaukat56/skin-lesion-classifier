name: Skin Lesion Classifier CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python Files
        run: |
          python -m compileall app deployment